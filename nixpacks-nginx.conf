# Self-contained nginx config for Laravel + Inertia on Coolify/Nixpacks.
#
# We ship this instead of relying on the Nixpacks PHP provider's
# nginx.template.conf, which has been emitting a malformed config with
# duplicate `location /` blocks on Laravel projects.
#
# php-fpm listens on 127.0.0.1:9000 — that's the Nixpacks PHP provider
# default and we don't override it.

daemon off;
error_log /dev/stderr info;
pid /tmp/nginx.pid;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Inline MIME types — nginx in the Nixpacks base image lives under
    # /nix/store/..., so there is no stable /etc/nginx/mime.types to
    # include. This covers everything a Laravel + Vite app serves.
    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        text/plain                            txt;
        text/cache-manifest                   appcache manifest;
        text/mathml                           mml;
        text/vcard                            vcf vcard;
        text/vtt                              vtt;

        application/javascript                js mjs;
        application/json                      json map;
        application/ld+json                   jsonld;
        application/manifest+json             webmanifest;
        application/wasm                      wasm;
        application/xml                       xml xsl;
        application/rss+xml                   rss;
        application/atom+xml                  atom;
        application/pdf                       pdf;
        application/zip                       zip;
        application/x-7z-compressed           7z;
        application/x-rar-compressed          rar;
        application/x-tar                     tar;
        application/gzip                      gz;
        application/octet-stream              bin exe dll deb dmg iso img msi;

        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        image/png                             png;
        image/svg+xml                         svg svgz;
        image/webp                            webp;
        image/avif                            avif;
        image/x-icon                          ico;
        image/tiff                            tif tiff;
        image/heic                            heic;
        image/heif                            heif;

        audio/mpeg                            mp3;
        audio/ogg                             ogg oga;
        audio/wav                             wav;
        audio/webm                            weba;

        video/mp4                             mp4 m4v;
        video/mpeg                            mpeg mpg;
        video/webm                            webm;
        video/quicktime                       mov;
        video/x-msvideo                       avi;

        font/woff                             woff;
        font/woff2                            woff2;
        font/ttf                              ttf;
        font/otf                              otf;
        font/collection                       ttc;
        application/vnd.ms-fontobject         eot;

        application/msword                    doc;
        application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
        application/vnd.ms-excel              xls;
        application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
        application/vnd.ms-powerpoint         ppt;
        application/vnd.openxmlformats-officedocument.presentationml.presentation pptx;
    }
    default_type  application/octet-stream;

    access_log   /dev/stdout;
    sendfile     on;
    tcp_nopush   on;
    tcp_nodelay  on;
    keepalive_timeout 65;
    server_tokens off;

    # Laravel file-upload friendly defaults. Tune in .env via PHP's
    # upload_max_filesize if you need more.
    client_max_body_size 50M;

    # Temp + cache dirs writable by the non-root nginx worker.
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    server {
        listen 80 default_server;
        server_name _;
        root /app/public;
        index index.php;

        charset utf-8;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Laravel front-controller pattern.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        # Long cache for Vite build artifacts — they're content-hashed.
        location ^~ /build/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 120s;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # Block access to dotfiles (except .well-known for ACME etc.).
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
